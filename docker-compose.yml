services:
  db:
    image: postgres:15-alpine
    container_name: aetheris_db
    restart: always
    environment:
      POSTGRES_USER: aetheris_admin
      POSTGRES_PASSWORD: SecretPGPass2026!
      POSTGRES_DB: aetheris_analytics
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aetheris_admin -d aetheris_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aetheris_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: aetheris_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://aetheris_admin:SecretPGPass2026!@db:5432/aetheris_analytics
      - SECRET_KEY=super-secret-aetheris-key-2026-indigo-glow-987654321
      - USE_MOCK_SAP=True
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: aetheris_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
