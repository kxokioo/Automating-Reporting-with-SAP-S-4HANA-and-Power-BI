name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Debug - verify SECRET_KEY is provided to the job
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          # Print numeric length only (do not reveal the secret)
          if [ -z "$SECRET_KEY" ]; then
            echo "ERROR: SECRET_KEY is empty or not available to the job"
            exit 1
          fi
          echo "SECRET_KEY length: ${#SECRET_KEY}"

      - name: Create .env file for testing (use job env variable)
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          cd backend
          # Use the shell variable so interpolation happens at runtime
          printf "SECRET_KEY=%s\n" "$SECRET_KEY" > .env
          printf "DEBUG=true\n" >> .env
          printf "USE_MOCK_SAP=true\n" >> .env
          echo "--- .env preview (first 2 lines, secret masked by GitHub) ---"
          head -n 2 .env || true
          echo "--- end preview ---"

      - name: Run Backend Pytest Suite
        run: |
          cd backend
          pytest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run Vite Production Bundle Compile
        run: |
          cd frontend
          npm run build
