name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Create .env file and verify SECRET_KEY
        run: |
          cd backend
          printf "SECRET_KEY=%s\n" "$SECRET_KEY" > .env
          printf "DEBUG=true\n" >> .env
          printf "USE_MOCK_SAP=true\n" >> .env
          echo "--- .env preview (masked) ---"
          head -n 2 .env
          echo "--- end preview ---"
          echo "ENV SECRET_KEY length: ${#SECRET_KEY}"
          python -c "import os; print('PYTHON SECRET_KEY present:', bool(os.getenv('SECRET_KEY'))); print('PYTHON SECRET_KEY length:', len(os.getenv('SECRET_KEY') or ''))"

      - name: Run Backend Pytest Suite
        run: |
          cd backend
          pytest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run Vite Production Bundle Compile
        run: |
          cd frontend
          npm run build
